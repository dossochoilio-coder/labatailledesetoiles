name: Keystore Helper (base64 + empreinte)

# Déclenchement MANUEL depuis l'onglet Actions
on:
  workflow_dispatch:

jobs:
  helper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Traiter le keystore
        run: |
          set -e
          # Le fichier k.jks doit être placé à la racine du repo (voir instructions)
          if [ ! -f k.jks ]; then
            echo "❌ Fichier k.jks introuvable à la racine du repo."
            echo "   Place ton fichier k.jks à la racine et relance."
            exit 1
          fi

          echo "=================================================="
          echo "1) EMPREINTE de la clé (vérifie qu'elle = DA:72...)"
          echo "=================================================="
          # Essaie plusieurs alias/mots de passe courants
          keytool -list -v -keystore k.jks -alias k -storepass Dosco2026 2>/dev/null | grep -E "SHA1:|SHA-1:|Alias" || \
          keytool -list -v -keystore k.jks -storepass Dosco2026 2>/dev/null | grep -E "SHA1:|SHA-1:|Alias" || \
          echo "⚠️ Impossible de lire avec le mot de passe Dosco2026. Vérifie le mot de passe."

          echo ""
          echo "=================================================="
          echo "2) BASE64 du keystore (à copier dans le secret)"
          echo "=================================================="
          base64 -w 0 k.jks > k_base64.txt
          echo "Longueur base64 : $(wc -c < k_base64.txt) caractères"

      - name: Télécharger le base64 en artefact
        uses: actions/upload-artifact@v4
        with:
          name: KEYSTORE-BASE64
          path: k_base64.txt
