name: Build DOSCO APK + AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install deps
        run: npm install

      - name: Install TypeScript
        run: npm install -D typescript

      - name: Install Google Play Billing plugin
        run: npm install @capacitor-community/in-app-purchases@^7.0.0 || npm install @capacitor-community/in-app-purchases || echo "plugin billing optionnel"

      - name: Write capacitor.config.js
        run: |
          cat <<EOF > capacitor.config.js
          module.exports = {
            appId: 'com.dosco.batailledesetoiles',
            appName: 'DOSCO',
            webDir: 'dist',
            server: { androidScheme: 'http' },
            android: { allowMixedContent: true }
          };
          EOF

      - name: Clean old configs
        run: rm -f capacitor.config.ts capacitor.config.json

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp DOSCO_Standalone.html dist/index.html

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Add Android platform
        run: |
          if [ ! -d android ]; then
            npx cap add android
          else
            echo "exists"
          fi

      - name: Inject AD_ID permission into manifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          echo "=== Manifeste avant ==="
          cat "$MANIFEST"
          # Ajouter la permission AD_ID si absente (déclaration Play Console : l'app utilise un identifiant publicitaire)
          if ! grep -q "com.google.android.gms.permission.AD_ID" "$MANIFEST"; then
            sed -i 's#<application#<uses-permission android:name="com.google.android.gms.permission.AD_ID"/>\n\n    <application#' "$MANIFEST"
            echo "=== Permission AD_ID ajoutée ==="
          else
            echo "AD_ID déjà présente"
          fi
          echo "=== Manifeste après ==="
          cat "$MANIFEST"

      - name: Inject DOSCO icons (Sirus + Rigel)
        run: |
          if [ -d android-res ]; then
            for dens in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              if [ -d "android-res/mipmap-$dens" ]; then
                mkdir -p "android/app/src/main/res/mipmap-$dens"
                cp android-res/mipmap-$dens/*.png "android/app/src/main/res/mipmap-$dens/" 2>/dev/null || true
              fi
            done
            echo "✅ Icônes DOSCO copiées dans le projet Android"
          else
            echo "⚠️ dossier android-res introuvable"
          fi

      - name: Force API 35 (targetSdk / compileSdk)
        run: |
          VARS=android/variables.gradle
          if [ -f "$VARS" ]; then
            echo "=== variables.gradle avant ==="
            cat "$VARS"
            sed -i 's/compileSdkVersion = [0-9]*/compileSdkVersion = 35/' "$VARS"
            sed -i 's/targetSdkVersion = [0-9]*/targetSdkVersion = 35/' "$VARS"
            echo "=== variables.gradle après ==="
            cat "$VARS"
            echo "✅ API 35 forcée dans variables.gradle"
          else
            echo "⚠️ variables.gradle introuvable"
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set app version (versionCode + versionName)
        run: |
          GRADLE=android/app/build.gradle
          # versionCode croissant : on part de 1 (déjà utilisé) + numéro de run GitHub
          # -> garantit un code unique et toujours plus grand à chaque build
          VCODE=$(( 1 + ${{ github.run_number }} ))
          VNAME="1.0.${{ github.run_number }}"
          echo "versionCode cible : $VCODE"
          echo "versionName cible : $VNAME"
          if [ -f "$GRADLE" ]; then
            sed -i "s/versionCode [0-9]\+/versionCode $VCODE/" "$GRADLE"
            sed -i "s/versionName \"[^\"]*\"/versionName \"$VNAME\"/" "$GRADLE"
            echo "=== defaultConfig après modification ==="
            grep -E "versionCode|versionName" "$GRADLE" || true
            echo "✅ Version appliquée (code=$VCODE, name=$VNAME)"
          else
            echo "⚠️ build.gradle introuvable"
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build AAB
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Restore or create signing keystore
        run: |
          set -e
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            # Réutiliser la clé PERMANENTE stockée dans les secrets GitHub
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > k.jks
            echo "✅ Keystore permanent restauré depuis les secrets"
          else
            # Aucun secret défini : générer une clé (À FAIRE UNE SEULE FOIS, puis la sauvegarder)
            echo "⚠️ Aucun KEYSTORE_BASE64 dans les secrets — génération d'une clé temporaire"
            keytool -genkeypair \
              -keystore k.jks \
              -alias "${{ secrets.KEY_ALIAS }}" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -keypass "${{ secrets.KEY_PASSWORD }}" \
              -dname "CN=DOSCO,O=DOSCO,C=CM" \
              -storetype JKS -noprompt
          fi
          # Afficher l'empreinte SHA1 pour vérification (doit correspondre à Google Play)
          keytool -list -v -keystore k.jks \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" 2>/dev/null | grep "SHA1:" || true

      - name: Sign packages
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -e
          BT=$(ls -d ${ANDROID_HOME}/build-tools/*/ | sort -V | tail -1)

          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          AAB=$(find android/app/build/outputs/bundle/release -name "*.aab" | head -1)

          ${BT}zipalign -f -v -p 4 "$APK" aligned.apk

          ${BT}apksigner sign \
            --ks k.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass pass:"$KS_PASS" \
            --key-pass pass:"$KEY_PASS" \
            --out dosco.apk \
            aligned.apk

          ${BT}apksigner verify dosco.apk

          jarsigner -keystore k.jks -storepass "$KS_PASS" -keypass "$KEY_PASS" "$AAB" "$KEY_ALIAS"

          cp "$AAB" dosco.aab

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-APK
          path: dosco.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-AAB
          path: dosco.aab

      - name: Upload KEYSTORE
        uses: actions/upload-artifact@v4
        with:
          name: SAVE-KEYSTORE
          path: k.jks
