name: Build DOSCO APK + AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install deps
        run: npm install
        
      - name: Install TypeScript
        run: npm install -D typescript
        
      - name: Write capacitor.config.json
        run: |
          node -e "
          require('fs').writeFileSync('capacitor.config.json', JSON.stringify({
            appId: 'com.dosco.labatailledesetoiles',
            appName: 'DOSCO',
            webDir: 'dist',
            bundledWebRuntime: false,
            server: { androidScheme: 'http' },
            android: { allowMixedContent: true }
          }, null, 2));
          "

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp DOSCO_Standalone.html dist/index.html

      - uses: android-actions/setup-android@v3

      # ✅ FIX SDK ANDROID
      - name: Install Android SDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-33" "build-tools;33.0.2"

      - name: Add Android platform
        run: |
          [ ! -d android ] && npx cap add android || echo "exists"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ✅ BUILD APK
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace

      # ✅ BUILD AAB (IMPORTANT)
      - name: Build AAB
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon --stacktrace

      # ✅ SIGN APK + AAB
      - name: Sign packages
        run: |
          set -e

          keytool -genkeypair \
            -keystore k.jks \
            -alias k \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass Dosco2026 \
            -keypass Dosco2026 \
            -dname "CN=DOSCO,O=DOSCO,C=CM" \
            -storetype JKS \
            -noprompt

          BT=$(ls -d ${ANDROID_HOME}/build-tools/*/ | sort -V | tail -1)

          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          AAB=$(find android/app/build/outputs/bundle/release -name "*.aab" | head -1)

          # APK
          ${BT}zipalign -f -v -p 4 "$APK" aligned.apk

          ${BT}apksigner sign \
            --ks k.jks \
            --ks-key-alias k \
            --ks-pass pass:Dosco2026 \
            --key-pass pass:Dosco2026 \
            --out dosco.apk \
            aligned.apk

          ${BT}apksigner verify dosco.apk

          # AAB
          jarsigner \
            -keystore k.jks \
            -storepass Dosco2026 \
            -keypass Dosco2026 \
            "$AAB" k

          cp "$AAB" dosco.aab

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-APK
          path: dosco.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-AAB
          path: dosco.aab

      - name: Upload KEYSTORE
        uses: actions/upload-artifact@v4
        with:
          name: SAVE-KEYSTORE
          path: k.jks
