name: Build DOSCO AAB (Play Store Ready)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Clean Capacitor configs
        run: |
          rm -f capacitor.config.ts
          rm -f capacitor.config.js

      - name: Create capacitor.config.json
        run: |
          cat > capacitor.config.json << 'CAPEOF'
          {
            "appId": "com.dosco.labatailledesetoiles",
            "appName": "DOSCO",
            "webDir": "dist",
            "bundledWebRuntime": false,
            "android": {
              "allowMixedContent": true,
              "captureInput": true
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 2000,
                "backgroundColor": "#03040a",
                "showSpinner": false
              }
            }
          }
          CAPEOF

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp DOSCO_Standalone.html dist/index.html
          echo "dist/index.html: $(wc -c < dist/index.html) bytes"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "android/ existe deja"
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Configure network security
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="true">
              <trust-anchors><certificates src="system"/></trust-anchors>
            </base-config>
            <domain-config cleartextTrafficPermitted="true">
              <domain includeSubdomains="true">localhost</domain>
              <domain includeSubdomains="true">capacitor.localhost</domain>
              <domain includeSubdomains="true">dosco-backend-production.up.railway.app</domain>
            </domain-config>
          </network-security-config>
          XMLEOF

      - name: Add monetization dependencies
        run: |
          GRADLE_FILE="android/app/build.gradle"
          grep -q "billing" "$GRADLE_FILE" || \
            sed -i '/dependencies {/a\    implementation "com.android.billingclient:billing:6.0.1"' "$GRADLE_FILE" || true
          grep -q "play-services-ads" "$GRADLE_FILE" || \
            sed -i '/dependencies {/a\    implementation "com.google.android.gms:play-services-ads:22.6.0"' "$GRADLE_FILE" || true

      - name: Set app version
        run: |
          GRADLE_FILE="android/app/build.gradle"
          VERSION_CODE=$(date +%Y%m%d%H)
          sed -i "s/versionCode .*/versionCode $VERSION_CODE/" "$GRADLE_FILE" || true
          sed -i "s/versionName .*/versionName \"1.0.0\"/" "$GRADLE_FILE" || true
          echo "Version 1.0.0 - code $VERSION_CODE"

      - name: Create upload keystore
        run: |
          keytool -genkey -v \
            -keystore dosco-upload.keystore \
            -alias dosco-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass doscostore2026 \
            -keypass doscokey2026 \
            -dname "CN=DOSCO, OU=Game, O=DOSCO Games, L=Yaounde, S=Centre, C=CM"
          echo "Keystore cree avec succes"
          ls -la dosco-upload.keystore

      - name: Configure signing in build.gradle
        run: |
          GRADLE_FILE="android/app/build.gradle"
          KEYSTORE_ABS="$(pwd)/dosco-upload.keystore"
          cat >> "$GRADLE_FILE" << GRADLEOF

          android {
              signingConfigs {
                  release {
                      storeFile file("${KEYSTORE_ABS}")
                      storePassword "doscostore2026"
                      keyAlias "dosco-key"
                      keyPassword "doscokey2026"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          GRADLEOF
          echo "Signature configuree"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release AAB
        run: cd android && ./gradlew bundleRelease --stacktrace

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease --stacktrace

      - name: List build outputs
        run: |
          echo "=== Fichiers generes ==="
          find android/app/build/outputs -name "*.aab" -o -name "*.apk" 2>/dev/null | xargs -I{} sh -c 'echo "  $(du -h {} | cut -f1)  {}"'

      - name: Upload keystore - SAUVEGARDEZ CE FICHIER
        uses: actions/upload-artifact@v4
        with:
          name: KEYSTORE-dosco-upload-SAUVEGARDEZ
          path: dosco-upload.keystore
          retention-days: 90

      - name: Upload AAB Play Store
        uses: actions/upload-artifact@v4
        with:
          name: dosco-release-aab-playstore
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: warn
          retention-days: 30

      - name: Upload APK signe
        uses: actions/upload-artifact@v4
        with:
          name: dosco-release-apk-signe
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn
          retention-days: 30
