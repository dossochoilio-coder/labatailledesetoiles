name: Build DOSCO APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      # ✅ React deps
      - run: npm install

      # ✅ Build web
      - run: npm run build

      # ✅ Mobile project
      - name: Create mobile project
        run: |
          mkdir mobile
          cd mobile
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init dosco com.dosco.game --web-dir=www
          mkdir www
          cp -r ../dist/* www/
          npx cap add android

      # ✅ Java
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ✅ 🔥 FIX CRITIQUE GRADLE
      - name: Fix Gradle environment
        run: |
          rm -rf ~/.gradle
          mkdir -p ~/.gradle

      # ✅ Build APK propre
      - name: Build APK
        run: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace --warning-mode all

      # ✅ Upload
      - uses: actions/upload-artifact@v4
        with:
          name: dosco-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
