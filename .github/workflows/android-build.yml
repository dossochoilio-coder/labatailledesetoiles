name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Clone repo
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Node setup
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    # 3. Install dependencies
    - name: Install dependencies
      run: npm install

    # 4. Build React app
    - name: Build web app
      run: npm run build

    # 5. Install Capacitor
    - name: Install Capacitor
      run: npm install @capacitor/core @capacitor/cli

    # 6. Sync Capacitor
    - name: Sync Capacitor
      run: |
        npx cap add android || true
        npx cap copy
        npx cap sync

    # 7. Java setup
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    # 8. Build APK
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    # 9. Upload APK artifact
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: dosco-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
``
