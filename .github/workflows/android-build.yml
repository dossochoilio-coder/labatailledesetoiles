name: Build DOSCO APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2g"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      # ✅ Install web deps
      - name: Install dependencies
        run: npm install

      # ✅ Build React/Vite
      - name: Build web app
        run: npm run build

      # ✅ Create Capacitor Android project
      - name: Create mobile project
        run: |
          mkdir mobile
          cd mobile
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init dosco com.dosco.game --web-dir=www
          mkdir www
          cp -r ../dist/* www/
          npx cap add android

      # ✅ Setup Java
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ✅ 🔥 FIX CRITIQUE : Désactiver instrumentation Gradle (cause du crash bcprov)
      - name: Fix Gradle compatibility
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.java.compile-classpath-packaging=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.configureondemand=false" >> ~/.gradle/gradle.properties

      # ✅ Clean cache (important en CI)
      - name: Clean Gradle cache
        run: rm -rf ~/.gradle/caches

      # ✅ Build APK
      - name: Build APK
        run: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      # ✅ Upload APK
      - uses: actions/upload-artifact@v4
        with:
          name: dosco-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
