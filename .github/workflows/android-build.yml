name: Build DOSCO APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install deps
        run: npm install

      - name: Write capacitor.config.json
        run: |
          node -e "
          require('fs').writeFileSync('capacitor.config.json', JSON.stringify({
            appId: 'com.dosco.labatailledesetoiles',
            appName: 'DOSCO',
            webDir: 'dist',
            bundledWebRuntime: false,
            server: { androidScheme: 'http' },
            android: { allowMixedContent: true }
          }, null, 2));
          "
          rm -f capacitor.config.ts capacitor.config.js
          cat capacitor.config.json

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp DOSCO_Standalone.html dist/index.html
          echo "HTML size: $(du -h dist/index.html | cut -f1)"

      - uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: |
          [ ! -d android ] && npx cap add android || echo "exists"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Patch AndroidManifest
        run: |
          M=android/app/src/main/AndroidManifest.xml
          python3 - << 'PY'
          import re
          with open('android/app/src/main/AndroidManifest.xml') as f:
              c = f.read()
          if 'largeHeap' not in c:
              c = re.sub(
                  r'(<application\b)',
                  r'\1 android:largeHeap="true" android:hardwareAccelerated="true"',
                  c, count=1
              )
          if 'INTERNET' not in c:
              c = c.replace(
                  '<application',
                  '<uses-permission android:name="android.permission.INTERNET"/>\n    <application'
              )
          with open('android/app/src/main/AndroidManifest.xml', 'w') as f:
              f.write(c)
          print('AndroidManifest OK')
          PY
          grep -E "largeHeap|INTERNET" android/app/src/main/AndroidManifest.xml

      - name: Write network_security_config.xml
        run: |
          mkdir -p android/app/src/main/res/xml
          python3 -c "
          xml = '''<?xml version=\"1.0\" encoding=\"utf-8\"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted=\"true\">
              <trust-anchors><certificates src=\"system\"/></trust-anchors>
            </base-config>
          </network-security-config>'''
          open('android/app/src/main/res/xml/network_security_config.xml','w').write(xml)
          print('network_security_config.xml OK')
          "

      - name: Set version
        run: |
          G=android/app/build.gradle
          VC=$(date +%Y%m%d%H)
          sed -i "s/versionCode [0-9]*/versionCode $VC/" $G
          sed -i 's/versionName "[^"]*"/versionName "1.0.0"/' $G
          echo "versionCode=$VC"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build unsigned release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -x lintVitalRelease \
            --no-daemon \
            --stacktrace \
            2>&1 | tail -80

      - name: Create keystore and sign
        run: |
          set -e

          # 1. Generer le keystore
          keytool -genkeypair \
            -keystore k.jks \
            -alias k \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass Dosco2026 \
            -keypass Dosco2026 \
            -dname "CN=DOSCO,O=DOSCO,C=CM" \
            -storetype JKS \
            -noprompt
          echo "Keystore OK: $(ls -la k.jks)"

          # 2. Trouver APK non signe
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: APK not found"
            find android/app/build/outputs -type f 2>/dev/null
            exit 1
          fi
          echo "APK: $APK ($(du -h $APK | cut -f1))"

          # 3. Build tools
          BT=$(ls -d ${ANDROID_HOME}/build-tools/*/ 2>/dev/null | sort -V | tail -1)
          echo "Build tools: $BT"

          # 4. Zipalign
          ${BT}zipalign -f -v -p 4 "$APK" aligned.apk
          echo "Zipalign OK"

          # 5. Signer
          ${BT}apksigner sign \
            --ks k.jks \
            --ks-key-alias k \
            --ks-pass pass:Dosco2026 \
            --key-pass pass:Dosco2026 \
            --out dosco.apk \
            aligned.apk
          echo "Signature OK"

          # 6. Verifier
          ${BT}apksigner verify dosco.apk
          echo "APK final: $(du -h dosco.apk | cut -f1)"

      - name: Upload KEYSTORE
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: KEYSTORE-SAUVEGARDEZ
          path: k.jks
          retention-days: 90

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-APK
          path: dosco.apk
          retention-days: 30
