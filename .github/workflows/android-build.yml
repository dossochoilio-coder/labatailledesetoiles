name: Build DOSCO APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Étape clé : créer le dossier dist avec le standalone HTML ──
      - name: Prepare dist from DOSCO_Standalone.html
        run: |
          mkdir -p dist
          # Copier le standalone HTML comme index.html de l'app
          cp DOSCO_Standalone.html dist/index.html
          echo "✅ dist/index.html créé depuis DOSCO_Standalone.html"
          ls -la dist/

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dosco-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
