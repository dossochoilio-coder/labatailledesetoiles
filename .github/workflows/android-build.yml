name: Build DOSCO APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install npm deps
        run: npm install

      - name: Remove conflicting Capacitor configs
        run: rm -f capacitor.config.ts capacitor.config.js

      - name: Write capacitor.config.json
        run: |
          node -e "
          require('fs').writeFileSync('capacitor.config.json', JSON.stringify({
            appId: 'com.dosco.labatailledesetoiles',
            appName: 'DOSCO',
            webDir: 'dist',
            bundledWebRuntime: false,
            android: { allowMixedContent: true },
            plugins: {
              SplashScreen: {
                launchShowDuration: 2000,
                backgroundColor: '#03040a',
                showSpinner: false
              }
            }
          }, null, 2));
          console.log('capacitor.config.json OK');
          "

      - name: Prepare web assets
        run: |
          mkdir -p dist
          cp DOSCO_Standalone.html dist/index.html
          echo "dist/index.html: $(du -sh dist/index.html | cut -f1)"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: |
          [ ! -d android ] && npx cap add android || echo "android/ exists"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Patch AndroidManifest for WebView performance
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Activer largeHeap et hardwareAccelerated
          sed -i 's/android:label="@string\/app_name"/android:label="@string\/app_name"\n        android:largeHeap="true"\n        android:hardwareAccelerated="true"/' "$MANIFEST" || true
          echo "AndroidManifest patched:"
          grep -E "largeHeap|hardwareAccelerated" "$MANIFEST" || echo "patch already applied or not found"

      - name: Write network_security_config.xml
        run: |
          mkdir -p android/app/src/main/res/xml
          node -e "
          var xml = '<?xml version=\"1.0\" encoding=\"utf-8\"?>'
            + '<network-security-config>'
            + '<base-config cleartextTrafficPermitted=\"true\">'
            + '<trust-anchors><certificates src=\"system\"/></trust-anchors>'
            + '</base-config>'
            + '<domain-config cleartextTrafficPermitted=\"true\">'
            + '<domain includeSubdomains=\"true\">localhost</domain>'
            + '<domain includeSubdomains=\"true\">capacitor.localhost</domain>'
            + '<domain includeSubdomains=\"true\">dosco-backend-production.up.railway.app</domain>'
            + '</domain-config>'
            + '</network-security-config>';
          require('fs').writeFileSync(
            'android/app/src/main/res/xml/network_security_config.xml', xml
          );
          console.log('network_security_config.xml OK');
          "

      - name: Add billing and ads dependencies
        run: |
          G=android/app/build.gradle
          grep -q 'billingclient' "$G" || sed -i '/^dependencies {/a\    implementation "com.android.billingclient:billing:6.0.1"' "$G"
          grep -q 'play-services-ads' "$G" || sed -i '/^dependencies {/a\    implementation "com.google.android.gms:play-services-ads:22.6.0"' "$G"

      - name: Set version
        run: |
          G=android/app/build.gradle
          VC=$(date +%Y%m%d%H)
          sed -i "s/versionCode [0-9]*/versionCode $VC/" "$G"
          sed -i 's/versionName "[^"]*"/versionName "1.0.0"/' "$G"
          echo "versionCode=$VC"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build unsigned release APK
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace
          echo "=== Build outputs ==="
          find app/build/outputs -name "*.apk" | xargs -I{} du -h {} 2>/dev/null

      - name: Sign APK with apksigner
        run: |
          # Creer le keystore
          keytool -genkeypair \
            -keystore upload.keystore \
            -alias doscokey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass Dosco2026 \
            -keypass Dosco2026 \
            -dname "CN=DOSCO,OU=Game,O=DOSCO,L=Yaounde,S=Centre,C=CM" \
            -storetype JKS
          echo "Keystore OK"

          # Trouver l'APK
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "APK: $APK"

          # Build tools path
          BT=$(ls -d ${ANDROID_HOME}/build-tools/* | sort -V | tail -1)
          echo "Build tools: $BT"

          # Zipalign
          ${BT}/zipalign -v -p 4 "$APK" dosco-aligned.apk

          # Signer
          ${BT}/apksigner sign \
            --ks upload.keystore \
            --ks-key-alias doscokey \
            --ks-pass pass:Dosco2026 \
            --key-pass pass:Dosco2026 \
            --out dosco-signed.apk \
            dosco-aligned.apk

          # Verifier
          ${BT}/apksigner verify --verbose dosco-signed.apk | head -5
          echo "APK final: $(du -h dosco-signed.apk | cut -f1)"

      - name: Upload keystore SAUVEGARDEZ
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: KEYSTORE-SAUVEGARDEZ
          path: upload.keystore
          retention-days: 90

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: dosco-release-signed
          path: dosco-signed.apk
          retention-days: 30
