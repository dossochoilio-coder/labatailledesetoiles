name: Build DOSCO APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Récupération du repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ✅ Installer dépendances
      - name: Install dependencies
        run: npm install

      # ✅ Build React
      - name: Build web app
        run: npm run build

      # ✅ Installer Capacitor
      - name: Install Capacitor CLI
        run: npm install @capacitor/core @capacitor/cli

      # ✅ Génération Android (IMPORTANT !!!)
      - name: Generate Android project
        run: |
          npx cap init dosco com.dosco.game
          npx cap add android

      # ✅ Copier fichiers web
      - name: Sync Capacitor
        run: |
          npx cap copy
          npx cap sync

      # ✅ Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ✅ Build APK
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # ✅ Upload APK
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dosco-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
