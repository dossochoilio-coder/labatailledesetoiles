name: Build DOSCO APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2g"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install web dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Create mobile project
        run: |
          mkdir mobile
          cd mobile
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init dosco com.dosco.game --web-dir=www
          mkdir www
          cp -r ../dist/* www/
          npx cap add android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ✅ 🔥 CORRECTION DÉCISIVE
      - name: Disable Gradle instrumentation (FINAL FIX)
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.java.compile-classpath-packaging=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.configureondemand=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=false" >> ~/.gradle/gradle.properties

      - name: Clean Gradle cache
        run: rm -rf ~/.gradle/caches

      - name: Build APK
        run: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace --no-build-cache

      - uses: actions/upload-artifact@v4
        with:
          name: dosco-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
