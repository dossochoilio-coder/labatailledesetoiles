name: Build Android APK / AAB

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20  # ou 22 selon ton projet Capacitor
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Capacitor sync / copy
        run: |
          npx cap sync android
          # ou npx cap copy android si tu préfères

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Update Gradle Wrapper (si nécessaire)
        run: |
          cd android
          ./gradlew wrapper --gradle-version 8.11.1 --distribution-type all

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      # Décommente pour AAB (Release)
      # - name: Build AAB (Release)
      #   run: |
      #     cd android
      #     ./gradlew bundleRelease --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
