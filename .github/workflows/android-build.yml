name: Build DOSCO APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install web dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Create Capacitor Android project
        run: |
          mkdir mobile
          cd mobile
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init dosco com.dosco.game --web-dir=www
          mkdir www
          cp -r ../dist/* www/
          npx cap add android

      - name: Patch Gradle version
        run: |
          cd mobile/android

          echo "Before patch:"
          cat gradle/wrapper/gradle-wrapper.properties

          sed -i -E 's#gradle-[0-9.]+-(bin|all)\.zip#gradle-8.7-bin.zip#g' gradle/wrapper/gradle-wrapper.properties

          echo "After patch:"
          cat gradle/wrapper/gradle-wrapper.properties

      - name: Patch Android Gradle Plugin if present
        run: |
          cd mobile/android

          if [ -f build.gradle ]; then
            sed -i -E "s/com.android.tools.build:gradle:[0-9.]+/com.android.tools.build:gradle:8.5.2/g" build.gradle
          fi

          if [ -f build.gradle.kts ]; then
            sed -i -E 's/id\("com.android.application"\) version "[0-9.]+" apply false/id("com.android.application") version "8.5.2" apply false/g' build.gradle.kts
          fi

          echo "Gradle files patched"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Clean Gradle environment
        run: |
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/daemon
          rm -rf ~/.gradle/native
          mkdir -p ~/.gradle

      - name: Build APK
        run: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace --warning-mode all

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dosco-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
